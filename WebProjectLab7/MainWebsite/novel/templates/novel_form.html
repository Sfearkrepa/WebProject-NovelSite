{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="content">
    <h1>{{ title }}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="form-button">Сохранить</button>
    </form>
    <a href="{% url 'novel_list' %}">Отмена</a>
</div>
{% endblock %}
