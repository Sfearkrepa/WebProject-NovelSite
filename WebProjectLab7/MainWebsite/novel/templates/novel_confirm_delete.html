{% extends 'base.html' %}
{% block title %}Удаление новеллы{% endblock %}

{% block content %}
<div class="content">
    <h1>Подтвердите удаление</h1>
    <p>Вы уверены, что хотите удалить новеллу "<strong>{{ novel.title }}</strong>"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" style="background:#CC0000; color:white;">Да, удалить</button>
        <a href="{% url 'novel_detail' slug=novel.slug %}">Отмена</a>
    </form>
</div>
{% endblock %}
